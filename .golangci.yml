version: "2"


linters:
  default: all
  disable:
    - wsl
    - gochecknoglobals
    - rowserrcheck # disabled due to generics issues
    - sqlclosecheck # disabled due to generics issues
    - wastedassign # disabled due to generics issues

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    funlen:
      lines: 60
      statements: 40
    govet:
      disable-all: false
    gocyclo:
      min-complexity: 12
    depguard:
      rules:
        main:
          deny:
            - pkg: "github.com/pkg/errors"
              desc: "use standard errors package"
    misspell:
      locale: US
    lll:
      line-length: 120
    unused:
      field-writes-are-uses: true
      post-statements-are-reads: true
      generated-is-used: true
      exported-fields-are-used: true
      parameters-are-used: true
      local-variables-are-used: true
    unparam:
      check-exported: true
    nakedret:
      max-func-lines: 30
    gocritic:
      # Enable multiple checks by tags, run `GL_DEBUG=gocritic golangci-lint` run to see all tags and checks.
      # Empty list by default. See https://github.com/go-critic/go-critic#usage -> section "Tags".
      enabled-tags:
        - performance
        - opinionated
        - diagnostic
        - style
    whitespace:
      multi-if: false

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: true
  # exclude-rules:
  #   # Exclude some linters from running on tests files.
  #   - path: _test\.go
  #     linters:
  #       - unused
  #       - godox
  #       - lll
