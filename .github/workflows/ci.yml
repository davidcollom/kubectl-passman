name: CI

on:
  push:
    branches:
      - main
      - conjur-support
      - 'feature/**'
      - 'fix/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: './go.mod'
      - name: Run tests
        run: go test -v ./...
      - name: Build
        run: go build -v ./cmd/kubectl-passman

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: './go.mod'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
            go-version-file: './go.mod'
            go-package: ./...
